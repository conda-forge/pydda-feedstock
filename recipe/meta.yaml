{% set name = "pydda" %}
{% set version = "2.4.1" %}
{% set python_min = "3.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: e02c34bf9cf6dd635debad091d071af1904389d45d86ed8bb6d136f1c57220d8

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - xarray >=2024.10.0
    - numpy
    - scipy
    - matplotlib-base
    - cartopy
    - dask
    - distributed
    - six
    - arm_pyart

test:
  requires:
    - pytest
    - distributed
    - cfgrib
  imports:
    - pydda
  commands:
    - py.test --pyargs pydda

about:
  home: http://openradarscience.org/PyDDA
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Pythonic Direct Data Assimilation

  description: |
    PyDDA is a Pythonic package for developing wind retrievals.
    It uses the variational technique for assmilating together winds
    derived from radars and models.
  doc_url: http://openradarscience.org/PyDDA
  dev_url: https://github.com/openradar/PyDDA

extra:
  recipe-maintainers:
    - rcjackson
